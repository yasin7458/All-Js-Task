<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <main>Total Books : </main>
    <section>
        <button class="display">Display Data</button>
        <button class="add">Add New Book</button>
        <button class="update">Update Book</button>
        <button class="delete">Delete Book</button>
        <button class="search">Search Book</button>
        <button class="issue">Issue Book</button>
        <button class="returnBook">Return Book</button>
        <button class="asc">Sort Asc</button>
        <button class="desc">Sort Desc</button>
        <button class="status">Book Status</button>
    </section>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Category</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

  <script src="./script.js"></script>

</body>
</html>
